name: Cal1Card V2 CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cal1card-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax and unit/API tests
        run: |
          npm run check:syntax
          npm test

      - name: Install browser runtimes
        run: npx playwright install --with-deps chromium webkit

      - name: Browser, responsive and accessibility tests
        run: npm run test:e2e

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-diagnostics
          path: |
            playwright-report/
            test-results/
          retention-days: 7
